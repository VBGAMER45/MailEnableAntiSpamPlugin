; SpamFilter.ini  — place this next to SpamFilter.dll (in BOTH bin\ and bin64\).
; Values are read once when the SMTP service first loads the plugin; restart the
; MailEnable SMTP connector after changing them.

[SpamFilter]
; Where SpamAssassin for Windows (spamd) is listening.
SpamdHost=127.0.0.1
SpamdPort=783

; SpamAssassin score at/above which the message is tagged as spam.
SpamThreshold=5.0

; 1 = also tag messages that FAIL DMARC when the sender's policy is
;     p=quarantine or p=reject (even if the SA score is below threshold).
; 0 = ignore DMARC, tag on SA score only.
EnforceDmarc=1

; 1 = skip scanning for authenticated senders (your own users sending out).
SkipAuthenticated=1

; authserv-id written into the Authentication-Results header (use your hostname).
AuthServId=mail.local

; spamd socket timeout in milliseconds. If spamd is unreachable the plugin fails
; open (delivers the message unmarked).
TimeoutMs=10000

; Troubleshooting: Debug=1 appends one line per scanned message to DebugLog.
Debug=0
DebugLog=C:\Program Files (x86)\Mail Enable\Logging\SpamFilter.log
