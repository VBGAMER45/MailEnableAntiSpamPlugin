; SpamFilter.ini  — place this next to SpamFilter.dll (in BOTH bin\ and bin64\).
; Most values are read once when the SMTP service loads the plugin; restart the
; MailEnable SMTP connector after changing them. (The keyword FILE itself is
; live-reloaded — see KeywordReloadSeconds.)

[SpamFilter]

; =================== SpamAssassin (optional) ==========================
; UseSpamAssassin=0 disables the spamd call entirely. The whitelist, TLD and
; keyword checks still work, so you can run those before installing SpamAssassin.
UseSpamAssassin=1
SpamdHost=127.0.0.1
SpamdPort=783
SpamThreshold=5.0

; Tag messages that FAIL DMARC when the sender policy is p=quarantine/reject.
; Only applied when SpamAssassin actually answered (real SPF/DKIM results).
EnforceDmarc=1

; =================== TLD allow-list ==================================
; Tag any message whose From: header domain ends in a TLD NOT listed here.
; Matches the final label, so 'uk' also covers co.uk. Space/comma separated.
; NOTE: this is aggressive — it also blocks .edu .gov .ca .de .au .io etc.
TldFilter=1
AllowedTlds=com uk net org us

; =================== Subject keyword filter ==========================
; KeywordFile = one word/phrase/regex per line (see SpamKeywords.txt).
SubjectKeywordFilter=1
KeywordFile=C:\Program Files (x86)\Mail Enable\bin64\SpamKeywords.txt
KeywordReloadSeconds=5

; =================== Whitelist (bypasses ALL marking) ================
; Trusted domains (subdomains included) and/or specific addresses always
; deliver untouched. Space/comma separated.
WhitelistDomains=
WhitelistSenders=

; =================== Move-to-Junk ====================================
; When a message is tagged, also inject MailEnable's native routing header
;   X-ME-Content: Deliver-To=Junk
; which delivers it straight to the mailbox Junk E-Mail folder WITHOUT needing
; a Professional/Enterprise content filter. Requires the post office's junk
; delivery option to be enabled (see README). 1 = on, 0 = off.
DeliverToJunkHeader=1

; =================== General =========================================
; authserv-id written into the Authentication-Results header (use your hostname).
AuthServId=mail.local
; spamd socket timeout (ms). If spamd is unreachable the plugin fails open.
TimeoutMs=10000

; Troubleshooting: Debug=1 appends one line per scanned message to DebugLog.
Debug=0
DebugLog=C:\Program Files (x86)\Mail Enable\Logging\SpamFilter.log
